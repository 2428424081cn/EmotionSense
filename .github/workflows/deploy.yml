name: Validate & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML structure
        run: |
          grep -q '<!DOCTYPE html>' index.html || { echo "Missing DOCTYPE"; exit 1; }
          grep -q '<html' index.html || { echo "Missing html tag"; exit 1; }
          grep -q '</html>' index.html || { echo "Missing closing html tag"; exit 1; }
          grep -q '<body>' index.html || { echo "Missing body tag"; exit 1; }
          grep -q '</body>' index.html || { echo "Missing closing body tag"; exit 1; }
          echo "HTML structure validated"

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4